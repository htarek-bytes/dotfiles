# =============================================================================
#  DESKTOP - HYPRLAND CONFIG (Ported from MacBook)
# =============================================================================

source = ~/.config/hypr/monitors.conf
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
# --- 2. INPUT & KEYBOARD ---
input {
    kb_layout = us,ca
    kb_options = grp:win_space_toggle,ctrl:nocaps
    # follow_mouse = 1
    # No touchpad block needed for desktop mouse
}

# Alt + Tab -> Open Window Switcher (Rofi)
bind = SUPER, Tab, exec, rofi -show window

# --- 3. STARTUP ---
exec-once = systemctl --user start wireplumber pipewire pipewire-pulse
exec-once = waybar &
exec-once = swww-daemon &
exec-once = nm-applet &
exec-once = swaync &
exec-once = pkill gsd-media-keys || true
# --- 4. KEYBINDINGS ---
$mainMod = SUPER
# --- A. SYSTEM SHORTCUTS ---
bind = SUPER, comma, exec, gnome-control-center
bind = SUPER, S, exec, ~/.config/hypr/sysmenu.sh
bindr = SUPER, SUPER_L, exec, pkill rofi || rofi -show drun
bind = SUPER, Return, exec, ptyxis
bind = CTRL, E, exec, nautilus

# --- WINDOW MANAGEMENT ---
bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d

bind = SUPER SHIFT, Left, movewindow, l
bind = SUPER SHIFT, Right, movewindow, r
bind = SUPER SHIFT, Up, movewindow, u
bind = SUPER SHIFT, Down, movewindow, d

# --- WINDOW HIDING & WALLPAPERS ---
bind = ALT, H, exec, ~/.config/hypr/hide_window.sh
bind = ALT SHIFT, H, togglespecialworkspace, hidden
bind = ALT, W, exec, ~/.config/hypr/cycle_wallpaper.sh
bind = ALT, F, fullscreen

# --- SWITCHING APPS ---
bind = ALT, Tab, cyclenext
bind = ALT, Tab, bringactivetotop
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop
# --- C. SCREENSHOTS ---
bind = SUPER, P, exec, ~/.config/hypr/screenshot_active.sh
bind = SUPER SHIFT, P, exec, ~/.config/hypr/screenshot_full.sh
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# --- D. WORKSPACE NAVIGATION ---
bind = ALT, Left, workspace, m-1
bind = ALT, Right, workspace, m+1
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4

# --- E. MOVING WINDOWS ---
bind = SHIFT ALT, 1, movetoworkspace, 1
bind = SHIFT ALT, 2, movetoworkspace, 2
bind = SHIFT ALT, 3, movetoworkspace, 3
bind = SHIFT ALT, 4, movetoworkspace, 4
bind = SHIFT ALT, Left, movetoworkspace, m-1
bind = SHIFT ALT, Right, movetoworkspace, m+1

# --- HARDWARE KEYS (Desktop - no brightness/kbd backlight) ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.8 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# --- 5. VISUALS ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = false
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = workspaces, 1, 4, default
}
cursor {
    no_hardware_cursors = true
}
# Cursor timeout
bind = SUPER SHIFT, C, exec, hyprctl keyword cursor:inactive_timeout 1
bind = SUPER SHIFT, X, exec, hyprctl keyword cursor:inactive_timeout 0
