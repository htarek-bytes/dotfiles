# =============================================================================
#  DESKTOP - HYPRLAND HARDWARE LAYER
# =============================================================================

# 1. PHYSICAL WIRING
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf

# 2. ENVIRONMENT & NVIDIA FIXES
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

cursor {
    no_hardware_cursors = true
}

# 3. DESKTOP INPUT
input {
    kb_layout = us,ca
    kb_options = grp:win_space_toggle,ctrl:nocaps
}

# 4. DESKTOP STARTUP (Specific Audio/Media logic)
exec-once = pkill gsd-media-keys || true

# Create the Virtual Recording Pipes
exec-once = pactl load-module module-null-sink sink_name=Studio_Record sink_properties=device.description=Studio_Record
exec-once = pactl load-module module-null-sink sink_name=Audacity_Out sink_properties=device.description=Audacity_Out

# 5. PLUG INTO THE SPIDER WEB (The Shared Logic)
source = ~/.config/hypr/base.conf
debug {
    disable_logs = true          # ← this is the main one; set to true to silence most debug spam
    enable_stdout_logs = false   # optional, if you see output in terminal
}
