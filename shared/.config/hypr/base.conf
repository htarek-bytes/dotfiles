# =============================================================================
#  SHARED HYPRLAND BASE - The "Nervous System"
# =============================================================================

# --- 1. THE BEAUTY (Instruction Layer) ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

input {
    kb_layout = us
    # This is the "Magic Link" that turns Caps into Ctrl
    kb_options = caps:ctrl_modifier 
    
    # Alternatively, if you want them SWAPPED (Caps becomes Ctrl, Ctrl becomes Caps):
    # kb_options = ctrl:swapcaps

    follow_mouse = 1
}
# --- 2. UNIVERSAL STARTUP ---
exec-once = systemctl --user start wireplumber pipewire pipewire-pulse
exec-once = waybar &
exec-once = nm-applet &
exec-once = swaync &
exec-once = ~/scripts/WallpaperAutoChange.sh ~/.config/wallpapers
exec-once = swww-daemon

# --- 3. GLOBAL VARIABLES ---
$mainMod = SUPER 

# --- 4. KEYBINDINGS (The Logic) ---

# System Apps
bind = $mainMod, comma, exec, gnome-control-center
bind = $mainMod, S, exec, ~/scripts/sysmenu.sh
bindr = $mainMod, SUPER_L, exec, pkill rofi || rofi -show drun
bind = $mainMod, Return, exec, ptyxis
bind = CTRL, E, exec, nautilus

# Window Focus
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d

# Window Movement
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Down, movewindow, d

# Hiding & Utility
bind = $mainMod, H, exec, ~/scripts/hide_window.sh
bind = $mainMod SHIFT, H, togglespecialworkspace, hidden

# --- WALLPAPER LOGIC ---
# Super + W to trigger a random wallpaper
# Instant change bind
bind = $mainMod, W, exec, ~/scripts/WallpaperRandom.sh
bind = $mainMod ALT, W, exec, ~/scripts/WallpaperEffects.sh

bind = $mainMod, F, fullscreen

# App Switching
bind = ALT, Tab, cyclenext
bind = ALT, Tab, bringactivetotop
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop

# Screenshots
bind = $mainMod, P, exec, $HOME/scripts/screenshot_active.sh
bind = $mainMod SHIFT, P, exec, $HOME/scripts/screenshot_full.sh
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Workspace Navigation (ALT + Arrows/Numbers)
bind = ALT, Left, workspace, m-1
bind = ALT, Right, workspace, m+1
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4

# Moving Windows to Workspaces
bind = SHIFT ALT, 1, movetoworkspace, 1
bind = SHIFT ALT, 2, movetoworkspace, 2
bind = SHIFT ALT, 3, movetoworkspace, 3
bind = SHIFT ALT, 4, movetoworkspace, 4

# --- 5. VISUALS & ANIMATIONS ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 8
    
    # You MUST have this block defined for 'layerrule = blur' to work
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        xray = true
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = workspaces, 1, 4, default
}

# Cursor Management
bind = $mainMod SHIFT, C, exec, hyprctl keyword cursor:inactive_timeout 1
bind = $mainMod CTRL, C, exec, hyprctl keyword cursor:inactive_timeout 0

# --- THEME MANAGEMENT ---
# Super + Ctrl + T: Open the Theme Selector
bind = $mainMod CTRL, T, exec, ~/scripts/Themes.sh

# Super + Ctrl + W: Open the Wallpaper Select Menu
bind = $mainMod CTRL, W, exec, ~/scripts/RefreshNoWaybar.sh

# Super + Alt + E: Open the Wallpaper Effects Menu
bind = $mainMod ALT, E, exec, ~/scripts/WallpaperEffects.sh
